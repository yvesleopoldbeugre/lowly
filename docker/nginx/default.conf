# docker/nginx/default.conf — voir DEPLOYMENT.md §4 et docs/engineering/15-deployment.md §4.
#
# Ce conteneur sert le trafic HTTP en clair (port 80, mappé sur 8000 côté
# hôte par docker-compose.yml). La terminaison TLS est assurée en amont
# (reverse proxy / load balancer) en `staging` et `production` — voir
# DEPLOYMENT.md §7 ; elle n'est pas dupliquée ici pour rester conforme au
# service `nginx` documenté en §3 de ce même fichier.

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 10M;

    # En-têtes de sécurité — voir docs/engineering/10-security-guidelines.md §10.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
    }

    # Sonde de santé Laravel — voir docs/engineering/15-deployment.md §6.
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    # Assets compilés (Vite/Tailwind) servis directement, sans passer par PHP.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|woff2?|ttf|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
