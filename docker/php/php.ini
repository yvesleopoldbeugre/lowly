; docker/php/php.ini — voir docs/engineering/15-deployment.md §3.
; Réglages applicatifs communs à production et développement (Xdebug est
; ajouté séparément par docker/php/xdebug.ini, uniquement en développement).

memory_limit = 256M
max_execution_time = 60
post_max_size = 10M
; Doit rester cohérent avec la contrainte de validation `image, max:5120`
; des Form Requests d'upload de photos — voir StoreResidencePhotoRequest.
upload_max_filesize = 8M

date.timezone = UTC

; OPcache — voir docs/engineering/11-performance-guidelines.md.
; `validate_timestamps` reste à sa valeur par défaut (activé) ici afin que
; les modifications de code soient prises en compte sans configuration
; supplémentaire, y compris en développement (docker/php/Dockerfile.dev
; charge ce même fichier). Le réglage de production
; (`opcache.validate_timestamps = 0`, fichiers non revérifiés à chaque
; requête) est isolé dans docker/php/opcache-prod.ini, chargé uniquement
; par docker/php/Dockerfile.
opcache.enable = 1
opcache.max_accelerated_files = 20000
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16

expose_php = Off
