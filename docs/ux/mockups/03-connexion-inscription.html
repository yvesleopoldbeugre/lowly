<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LOWLY — Connexion / Inscription</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      primary: {50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af'},
      neutral: {50:'#fafafa',100:'#f5f5f5',200:'#e5e5e5',300:'#d4d4d4',400:'#a3a3a3',500:'#737373',600:'#525252',700:'#404040',800:'#262626',900:'#171717'},
    } } }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-neutral-50 text-neutral-900" x-data="{ tab: 'connexion', wantsPartner: false }">

  <!-- Maquette UX/UI — voir UX_UI.md §8.3. Écrans : Connexion (§4.5) et Création de compte (§4.4). -->

  <div class="w-full max-w-md rounded-xl border border-neutral-200 bg-white p-8 shadow-sm">
    <div class="mb-6 text-center">
      <span class="text-xl font-semibold text-primary-700">LOWLY</span>
    </div>

    <div class="mb-6 flex rounded-md bg-neutral-100 p-1 text-sm font-medium">
      <button @click="tab = 'connexion'" :class="tab === 'connexion' ? 'bg-white shadow-sm text-neutral-900' : 'text-neutral-500'" class="flex-1 rounded-md py-2">Connexion</button>
      <button @click="tab = 'inscription'" :class="tab === 'inscription' ? 'bg-white shadow-sm text-neutral-900' : 'text-neutral-500'" class="flex-1 rounded-md py-2">Créer un compte</button>
    </div>

    <!-- Connexion -->
    <form x-show="tab === 'connexion'" class="space-y-4">
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Email</span>
        <input type="email" placeholder="vous@exemple.com" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
      </label>
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Mot de passe</span>
        <input type="password" placeholder="••••••••" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500">
      </label>
      <div class="flex items-center justify-between text-xs">
        <label class="flex items-center gap-2 text-neutral-600">
          <input type="checkbox" class="rounded border-neutral-300"> Se souvenir de moi
        </label>
        <a href="#" class="text-primary-700 hover:underline">Mot de passe oublié ?</a>
      </div>
      <button type="button" class="w-full rounded-md bg-primary-600 py-2.5 text-sm font-semibold text-white hover:bg-primary-700">Se connecter</button>
    </form>

    <!-- Inscription -->
    <form x-show="tab === 'inscription'" class="space-y-4" style="display:none">
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Nom complet</span>
        <input type="text" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm">
      </label>
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Email</span>
        <input type="email" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm">
      </label>
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Mot de passe</span>
        <input type="password" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm">
      </label>
      <label class="block">
        <span class="mb-1 block text-xs font-medium text-neutral-500">Confirmer le mot de passe</span>
        <input type="password" class="w-full rounded-md border border-neutral-300 px-3 py-2 text-sm">
      </label>
      <label class="flex items-start gap-2 text-xs text-neutral-600">
        <input type="checkbox" x-model="wantsPartner" class="mt-0.5 rounded border-neutral-300">
        <span>Je souhaite proposer des résidences ou véhicules en tant que partenaire</span>
      </label>
      <p x-show="wantsPartner" style="display:none" class="rounded-md bg-primary-50 p-3 text-xs text-primary-800">
        Votre profil partenaire sera soumis à validation par l'administration avant toute publication d'annonce
        (voir PRODUCT.md §8.3).
      </p>
      <button type="button" class="w-full rounded-md bg-primary-600 py-2.5 text-sm font-semibold text-white hover:bg-primary-700">Créer mon compte</button>
    </form>
  </div>

</body>
</html>
